<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio+</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0f19;
    color:white;
}

/* HEADER */
header{
    padding:18px;
    font-size:22px;
    font-weight:bold;
    background:#111827;
}

/* ADD BAR */
.addBar{
    padding:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    background:#0f172a;
}

.addBar input, .addBar select{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#1f2937;
    color:white;
}

.addBar button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* SECTIONS */
.section{
    padding:20px;
}

h2{
    margin-bottom:10px;
}

/* GRID */
.grid{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

/* CARDS */
.card{
    width:180px;
    background:#1f2937;
    border-radius:12px;
    cursor:pointer;
    overflow:hidden;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.05);
}

.thumb{
    height:100px;
    background:linear-gradient(135deg,#3b82f6,#9333ea);
}

.card-content{
    padding:10px;
}

.small{
    font-size:12px;
    color:#9ca3af;
}

/* PANEL */
.panel{
    position:fixed;
    right:0;
    top:0;
    width:320px;
    height:100%;
    background:#111827;
    padding:15px;
    overflow:auto;
    display:none;
}

.panel input{
    width:100%;
    padding:8px;
    margin:6px 0;
    border-radius:8px;
    border:none;
    background:#374151;
    color:white;
}

.panel button{
    width:100%;
    padding:10px;
    margin-top:6px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    font-weight:bold;
}

.episode{
    background:#1f2937;
    padding:10px;
    margin-top:8px;
    border-radius:10px;
    font-size:13px;
}
</style>
</head>

<body>

<header>🎬 Studio+</header>

<!-- ADD BAR -->
<div class="addBar">
<select id="type">
<option value="show">Show</option>
<option value="movie">Movie</option>
</select>

<input id="title" placeholder="Title">

<button onclick="create()">Create</button>
</div>

<!-- SHOWS -->
<div class="section">
<h2>📺 Shows</h2>
<div class="grid" id="shows"></div>
</div>

<!-- MOVIES -->
<div class="section">
<h2>🎞 Movies</h2>
<div class="grid" id="movies"></div>
</div>

<!-- PANEL -->
<div class="panel" id="panel">

<h3 id="panelTitle"></h3>

<div id="episodes"></div>

<hr>

<h4>Add Episode</h4>

<input id="season" type="number" placeholder="Season">
<input id="episode" type="number" placeholder="Episode">
<input id="epTitle" placeholder="Episode Title">
<input type="file" id="video" accept="video/*">

<button onclick="addEpisode()">Add Episode</button>
<button onclick="closePanel()" style="background:#ef4444;">Close</button>

</div>

<script>

let data = JSON.parse(localStorage.getItem("studio3")) || [];
let currentShow = null;

function save(){
    localStorage.setItem("studio3", JSON.stringify(data));
}

/* CREATE MOVIE OR SHOW */
function create(){

    const item = {
        id: Date.now(),
        type: type.value,
        title: title.value,
        episodes: []
    };

    data.push(item);
    save();
    render();

    title.value = "";
}

/* RENDER HOME */
function render(){

    const shows = data.filter(x => x.type === "show");
    const movies = data.filter(x => x.type === "movie");

    const showsDiv = document.getElementById("shows");
    const moviesDiv = document.getElementById("movies");

    showsDiv.innerHTML = "";
    moviesDiv.innerHTML = "";

    shows.forEach(show => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="thumb"></div>
            <div class="card-content">
                <b>${show.title}</b>
                <div class="small">${show.episodes.length} episodes</div>
            </div>
        `;

        div.onclick = () => openShow(show.id);

        showsDiv.appendChild(div);
    });

    movies.forEach(movie => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="thumb"></div>
            <div class="card-content">
                <b>${movie.title}</b>
                <div class="small">Movie</div>
            </div>
        `;

        moviesDiv.appendChild(div);
    });
}

/* OPEN SHOW */
function openShow(id){

    currentShow = data.find(x => x.id === id);

    document.getElementById("panelTitle").innerText = currentShow.title;

    document.getElementById("panel").style.display = "block";

    renderEpisodes();
}

/* EPISODES */
function renderEpisodes(){

    const box = document.getElementById("episodes");
    box.innerHTML = "";

    currentShow.episodes.forEach(ep => {
        const div = document.createElement("div");

        div.className = "episode";

        div.innerHTML = `
            <b>S${ep.season} E${ep.episode}</b><br>
            ${ep.title}
        `;

        box.appendChild(div);
    });
}

/* ADD EPISODE */
function addEpisode(){

    const file = document.getElementById("video").files[0];
    if(!file) return alert("Add video");

    const reader = new FileReader();

    reader.onload = function(){

        currentShow.episodes.push({
            season: season.value,
            episode: episode.value,
            title: epTitle.value,
            video: reader.result
        });

        save();
        renderEpisodes();
        render();

        alert("Episode added!");
    };

    reader.readAsDataURL(file);
}

/* CLOSE */
function closePanel(){
    panel.style.display = "none";
    currentShow = null;
}

render();

</script>

</body>
</html>
